name: Daily Hormuz Brief Update

on:
  schedule:
    # 06:00 UTC daily.
    # In CEST (Apr–Oct, Vienna) this fires at 08:00 local.
    # In CET (Nov–Mar, Vienna) this fires at 07:00 local — adjust to '0 7 * * *' if you want 08:00 year-round.
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual runs from the Actions tab (use this to test).

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run daily brief update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/update_brief.py

      - name: Commit and push if changed
        run: |
          git config user.name "Hormuz Brief Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --quiet --cached; then
            echo "No changes to commit."
          else
            git commit -m "Daily brief update: $(date -u +%Y-%m-%d)"
            git push
          fi
